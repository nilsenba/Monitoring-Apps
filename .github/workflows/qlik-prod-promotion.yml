name: Qlik Production Promotion

run-name: Qlik CICD ${{ inputs.jira_key || github.event.pull_request.head.ref }} -> ${{ inputs.artifact_ref || github.event.pull_request.merge_commit_sha }}

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    branches: [main]
    types: [closed]
  workflow_dispatch:
    inputs:
      jira_key:
        description: Jira ticket key, for example BIOPS-64108
        required: true
        type: string
      source_branch:
        description: Jira branch containing the signed-off UAT package
        required: true
        type: string
      artifact_ref:
        description: Git ref or commit SHA to deploy for manual testing
        required: true
        default: main
        type: string
      dry_run:
        description: Validate without writing to Qlik, Snowflake, or Jira
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  readiness-on-approval:
    name: Validate signed-off package on PR approval
    if: >
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'approved' &&
      github.event.pull_request.base.ref == 'main'
    uses: NilsenBA/ARBRepo_Central/.github/workflows/reusable-qlik-prod-promotion.yml@main
    with:
      operation: readiness
      jira_key: ${{ github.event.pull_request.head.ref }}
      artifact_repo_full_name: ${{ github.repository }}
      artifact_ref: ${{ github.event.pull_request.head.sha }}
      source_branch: ${{ github.event.pull_request.head.ref }}
      source_sha: ${{ github.event.pull_request.head.sha }}
      main_sha: ${{ github.event.pull_request.base.sha }}
      dry_run: true
    secrets: inherit

  deploy-production:
    name: Deploy merged or manually selected package
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'main')
    uses: NilsenBA/ARBRepo_Central/.github/workflows/reusable-qlik-prod-promotion.yml@main
    with:
      operation: deploy
      jira_key: ${{ github.event_name == 'workflow_dispatch' && inputs.jira_key || github.event.pull_request.head.ref }}
      artifact_repo_full_name: ${{ github.repository }}
      artifact_ref: ${{ github.event_name == 'workflow_dispatch' && inputs.source_branch || github.event.pull_request.merge_commit_sha }}
      source_branch: ${{ github.event_name == 'workflow_dispatch' && inputs.source_branch || github.event.pull_request.head.ref }}
      source_sha: ${{ github.event_name == 'workflow_dispatch' && inputs.source_branch || github.event.pull_request.head.sha }}
      main_sha: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.pull_request.merge_commit_sha }}
      dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
    secrets: inherit
